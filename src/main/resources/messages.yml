config-version: 1

core:
  prefix: "<#44CCFF><bold>Hydroxide</bold> <dark_gray>> <gray>"
  help:
    header: "<#44CCFF><bold>Hydroxide</bold> <gray>modern Paper server core"
    modules: "<gray>/{label} modules <dark_gray>- <white>Show loaded modules"
    reload: "<gray>/{label} reload <dark_gray>- <white>Reload config, messages, and modules"
    messages: "<gray>/{label} messages reload <dark_gray>- <white>Reload messages.yml"
    cooldown: "<gray>/{label} cooldown <dark_gray>- <white>Inspect or clear command cooldown entries"
    locale: "<gray>/editlocale [keyword|reload|set] <dark_gray>- <white>Search and edit customizable message keys"
  modules:
    entry: "{status_color}{module} <dark_gray>- <gray>{status} <dark_gray>- <white>{description}"
  reload:
    success: "<green>Hydroxide configuration, messages, and enabled modules reloaded."
  messages:
    reload-success: "<green>Hydroxide messages reloaded."
    reload-usage: "<red>Usage: /{label} messages reload"
  cooldown:
    usage: "<red>Usage: /{label} cooldown <status|clear> or /{label} cooldown clear <player|all> [command]"
    status: "<green>Active command cooldown entries: <white>{count}<green>."
    cleared-all: "<green>Cleared <white>{count}<green> cooldown entrie(s) matching command filter <white>{command}<green>."
    cleared-player: "<green>Cleared <white>{count}<green> cooldown entrie(s) for <white>{target}<green> matching command filter <white>{command}<green>."
    unknown-player: "<red>Player <white>{target}<red> is not online, cached, or a UUID."
    unavailable: "<red>Command cooldown management is not available until command-control is enabled."
  locale:
    usage: "<red>Usage: /{label} [keyword|reload|set <key> <value>]"
    set-usage: "<red>Usage: /{label} set <key> <value>"
    header: "<#44CCFF>Locale messages matching <white>{query}<gray> <dark_gray>(showing {count})"
    entry: "<gray>{key} <dark_gray>= <white>{value}"
    empty: "<red>No message keys matched <white>{query}<red>."
    set: "<green>Updated message key <white>{key}<green>. Backup: <white>{backup}<green>. New value: <white>{value}"
    missing-key: "<red>Message key <white>{key}<red> is not an existing editable string key."
    invalid-key: "<red>Message key <white>{key}<red> may only contain letters, numbers, dots, underscores, and hyphens."
    not-file-backed: "<red>Messages are not backed by a writable file in this runtime."
    save-failed: "<red>Could not save messages.yml: <white>{reason}"

help:
  header: "<#44CCFF><bold>Help</bold> <gray>page <white>{page}<gray>/<white>{total_pages}<gray> for <white>{query}"
  entry: "<gray>/<white>{command} <dark_gray>- <gray>{description} <dark_gray>(<white>{usage}<dark_gray>)"
  empty: "<red>No visible commands matched <white>{query}<red>."
  footer: "<dark_gray>Use <white>/{label} {next_page}<dark_gray> for the next page."

validation:
  no-permission: "<red>You do not have permission."
  player-only: "<red>Only players can use that command."
  console-only: "<red>Only console can use that command."
  cooldown: "<red>Wait <white>{remaining} <red>before using that again."
  usage: "<red>Usage: <white>{usage}"
  unknown-player: "<red>That player is not known."
  invalid-amount: "<red>Amount must be a valid number with at most two decimals."
  command-disabled: "<red>Command <white>{command}<red> is disabled on this server."
  command-permission-required: "<red>Command <white>{command}<red> requires permission <white>{permission}<red>."
  command-warmup-started: "<yellow>Command <white>{command}<yellow> will run in <white>{seconds}s<yellow>. Do not move or take damage."
  command-warmup-cancelled-moved: "<red>Command warmup cancelled because you moved."
  command-warmup-cancelled-damaged: "<red>Command warmup cancelled because you took damage."
  command-warmup-cancelled-block-break: "<red>Command warmup cancelled because you broke a block."
  command-cooldown: "<red>Command <white>{command}<red> is on cooldown for <white>{remaining}<red>."
  command-one-use-cooldown: "<red>Command <white>{command}<red> can only be used once."
  command-world-blocked: "<red>Command <white>{command}<red> cannot be used in world <white>{world}<red>."

chat:
  format: "<dark_gray>[<#44CCFF>{world}</#44CCFF>] <white>{name}<dark_gray>: <white>{message}"
  broadcast:
    usage: "<red>Usage: /{label} [!] <message> [-w:world,world] [-r:radius] [-c:world;x;y;z]"
    format: "<#FFB000><bold>Broadcast</bold> <dark_gray>> <white>{message}"
    clean-format: "<white>{message}"
    no-recipients: "<red>No online players matched that broadcast target."
  me:
    usage: "<red>Usage: /{label} <action>"
    format: "<dark_purple>* <light_purple>{player} <white>{message}"
  clearchat:
    usage: "<red>Usage: /{label} [self] [-s]"
    done: "<green>Chat cleared."
    self-done: "<green>Your chat was cleared."
    broadcast: "<gray>Chat was cleared by <white>{player}<gray>."
  message:
    usage: "<red>Usage: /{label} <player> <message>"
    player-offline: "<red>Player <white>{target} <red>is not online."
    console-name: "Console"
    received: "<dark_gray>[<#44CCFF>{player} <gray>-> <#44CCFF>you<dark_gray>] <white>{message}"
    sent: "<dark_gray>[<#44CCFF>you <gray>-> <#44CCFF>{target}<dark_gray>] <white>{message}"
    ignored-by-target: "<red><white>{target} <red>is ignoring you."
    target-ignored: "<red>You are ignoring <white>{target}<red>. Use <white>/ignore {target} <red>to receive messages again."
    target-disabled: "<red><white>{target} <red>is not accepting private messages."
  private-chat:
    usage: "<red>Usage: /{label} [player|off]"
    enabled: "<green>Private chat focused on <white>{target}<green>. Normal chat will now private-message them."
    disabled: "<green>Private chat disabled."
    status-on: "<green>Private chat is focused on <white>{target}<green>."
    status-off: "<gray>Private chat is disabled."
    player-offline: "<red>Player <white>{target} <red>is not online."
    self-denied: "<red>You cannot focus private chat on yourself."
    target-lost: "<yellow>Private chat target <white>{target}<yellow> is no longer online. Private chat disabled."
  reply:
    usage: "<red>Usage: /{label} <message>"
    no-target: "<red>You do not have anyone to reply to."
  msgtoggle:
    usage: "<red>Usage: /{label} [on|off]"
    enabled: "<green>You are now accepting private messages."
    disabled: "<yellow>You are no longer accepting private messages."
    unavailable: "<red>Private-message options are not available."
  ignore:
    usage: "<red>Usage: /{label} [player|list|clear]"
    added: "<green>You are now ignoring <white>{target}<green>."
    removed: "<green>You are no longer ignoring <white>{target}<green>."
    self-denied: "<red>You cannot ignore yourself."
    empty: "<gray>You are not ignoring anyone."
    list: "<green>Ignoring: <white>{players}"
    cleared: "<green>Cleared <white>{count}<green> ignored player(s)."
  socialspy:
    usage: "<red>Usage: /{label} [player] [on|off]"
    enabled: "<green>Social spy enabled."
    disabled: "<green>Social spy disabled."
    updated: "<green>Social spy for <white>{target} <green>is now <white>{state}<green>."
    player-offline: "<red>Player <white>{target} <red>is not online."
    format: "<dark_gray>[<#FFB000>Spy</#FFB000>] <white>{player} <gray>-> <white>{target}<dark_gray>: <gray>{message}"
  commandspy:
    usage: "<red>Usage: /{label} [player] [on|off]"
    enabled: "<green>Command spy enabled."
    disabled: "<green>Command spy disabled."
    updated: "<green>Command spy for <white>{target} <green>is now <white>{state}<green>."
    player-offline: "<red>Player <white>{target} <red>is not online."
    format: "<dark_gray>[<#FFB000>CommandSpy</#FFB000>] <white>{player}<dark_gray>: <gray>/{command}"
  mutechat:
    usage: "<red>Usage: /{label} [time|status|off] [-s] [reason]"
    default-reason: "Public chat is temporarily muted."
    enabled: "<green>Public chat muted for <white>{duration}<green>: <white>{reason}"
    disabled: "<green>Public chat mute disabled."
    status-enabled: "<yellow>Public chat is muted by <white>{player}<yellow> for <white>{remaining}<yellow>: <white>{reason}"
    status-disabled: "<gray>Public chat is not muted."
    blocked: "<red>Public chat is muted for <white>{remaining}<red>: <gray>{reason}"
    broadcast-enabled: "<yellow>Public chat was muted by <white>{player}<yellow> for <white>{duration}<yellow>: <white>{reason}"
    broadcast-disabled: "<green>Public chat mute was disabled by <white>{player}<green>."
  chatcolor:
    usage: "<red>Usage: /{label} [player] <hex|color|clear>"
    current: "{preview}<white>{target}<gray>'s chat color is <white>{name}<gray> (<white>{hex}<gray>, <white>{legacy}<gray>, <white>{mini}<gray>)."
    none: "<gray><white>{target} <gray>does not have a chat color selected."
    set: "{preview}Chat color for <white>{target} <gray>set to <white>{name}<gray> (<white>{hex}<gray>, <white>{legacy}<gray>, <white>{mini}<gray>)."
    cleared: "<green>Chat color cleared for <white>{target}<green>."
    invalid: "<red>Unknown chat color <white>{value}<red>. Use a color name, legacy code, or hex value like <white>#44CCFF<red>."
    player-offline: "<red>Player <white>{target} <red>is not online."
  colors:
    header: "<#44CCFF>Available colors <gray>({count})"
    entry: "{preview}{name} <dark_gray>- <gray>legacy <white>{legacy}<gray>, hex <white>{hex}<gray>, MiniMessage <white>{mini}"
  colorpicker:
    usage: "<red>Usage: /{label} <hex|color>"
    result: "{preview}Color <white>{input}<gray>: closest=<white>{name}<gray>, legacy=<white>{legacy}<gray>, hex=<white>{hex}<gray>, MiniMessage=<white>{mini}"
    invalid: "<red>Unknown color <white>{value}<red>. Use a color name, legacy code, or hex value like <white>#44CCFF<red>."
  colorlimits:
    usage: "<red>Usage: /{label} [player]"
    result: "<#44CCFF>Color limits for <white>{target}<gray>: chat={chat_color}, nickname={nickname_color}, nick-hex={nickname_hex}, gradient={nickname_gradient}, rainbow={nickname_rainbow}"
    player-offline: "<red>Player <white>{target} <red>is not online."
    state:
      allowed: "<green>allowed"
      denied: "<red>denied"

announcements:
  actionbar:
    usage: "<red>Usage: /{label} <player|all> [-s:seconds] <message>"
  bossbar:
    usage: "<red>Usage: /{label} <player|all> [-sec:seconds] <message>"
  title:
    usage: "<red>Usage: /{label} <player|all> [-in:ticks] [-keep:ticks] [-out:ticks] <title> [\\n subtitle]"
  ctellraw:
    usage: "<red>Usage: /{label} <player|all> <message>"
    sent: "<green>Sent formatted raw message to <white>{count}<green> player(s)."
  player-offline: "<red>Player <white>{target} <red>is not online."
  none-online: "<red>No players are online."
  sent: "<green>Sent <white>{type}<green> announcement to <white>{count}<green> player(s)."

economy:
  balance:
    self: "<green>Your balance is <white>{balance}<green>."
    other: "<green>{player} has <white>{balance}<green>."
    others-denied: "<red>You do not have permission to check another player's balance."
  pay:
    usage: "<red>Usage: /{label} <player> <amount>"
    self-denied: "<red>You cannot pay yourself."
    cancelled: "<red>Payment was cancelled by another plugin."
    failed-returned: "<red>Payment failed and funds were returned."
    sent: "<green>Paid <white>{target} {amount}<green>."
    received: "<green>You received <white>{amount} <green>from <white>{player}<green>."
    target-disabled: "<red><white>{target} <red>is not accepting payments."
  paytoggle:
    usage: "<red>Usage: /{label} [on|off]"
    enabled: "<green>You are now accepting payments."
    disabled: "<yellow>You are no longer accepting payments."
    unavailable: "<red>Player options are not available."
  command-cost:
    charged: "<gray>Command <white>{command}<gray> cost <white>{amount}<gray>. Balance: <white>{balance}<gray>."
    insufficient: "<red>Command <white>{command}<red> costs <white>{amount}<red>, but your balance is only <white>{balance}<red>."
    unavailable: "<red>Command <white>{command}<red> costs <white>{amount}<red>, but the economy service is unavailable."
  cheque:
    usage: "<red>Usage: /{label} [player] <amount>"
    name: "<#44CCFF>Cheque <white>{amount}"
    lore: "<gray>Right-click to redeem. <dark_gray>ID: {id}"
    created: "<green>Created a signed cheque for <white>{target}<green> worth <white>{amount}<green>."
    received: "<green>You received a signed cheque worth <white>{amount} <green>from <white>{player}<green>."
    redeemed: "<green>Redeemed cheque for <white>{amount}<green>."
    invalid: "<red>This cheque is invalid or has been tampered with."
    already-redeemed: "<red>This cheque has already been redeemed."
    inventory-full: "<red><white>{target}<red>'s inventory is full. The withdrawal was refunded."
    player-offline: "<red>Player <white>{target} <red>is not online."
    cancelled: "<red>Cheque transaction was cancelled by another plugin."
    insufficient: "<red><white>{target} <red>does not have enough money to create a cheque for <white>{amount}<red>."
    redeem-failed: "<red>Cheque redemption failed: <white>{reason}"
  eco:
    usage: "<red>Usage: /{label} <give|take|set> <player> <amount>"
    cancelled: "<red>Economy transaction was cancelled by another plugin."
    updated: "<green>Balance for <white>{player} <green>is now <white>{balance}<green>."
  baltop:
    header: "<#44CCFF><bold>Balance Top</bold> <gray>Page {page}"
    entry: "<gray>{rank}. <white>{player} <dark_gray>- <green>{balance}"
    empty: "<gray>No balances have been recorded yet."

nickname:
  usage: "<red>Usage: /{label} [player] <nickname|clear>"
  console-target-required: "<red>Console must specify a player."
  others-denied: "<red>You do not have permission to nickname other players."
  target-offline: "<red>That player is not online."
  cancelled: "<red>Nickname change was cancelled by another plugin."
  cleared: "<green>Nickname cleared for <white>{target}<green>."
  set: "<green>Nickname set for <white>{target}<green>."
  changed-notice: "<green>Your nickname was changed to <white>{nickname}<green>."
  validation-error: "<red>{reason}"
  permission:
    color: "<red>You need <white>hydroxide.nickname.color <red>to use colored nicknames."
    hex: "<red>You need <white>hydroxide.nickname.hex <red>to use hex nicknames."
    gradient: "<red>You need <white>hydroxide.nickname.gradient <red>to use gradient nicknames."
    rainbow: "<red>You need <white>hydroxide.nickname.rainbow <red>to use rainbow nicknames."
  realname:
    usage: "<red>Usage: /{label} <nickname>"
    found: "<green>That nickname belongs to <white>{player}<green>."
    missing: "<red>No active nickname matched <white>{nickname}<red>."
  nameplate:
    usage: "<red>Usage: /{label} [player] [-pref:<text>] [-suf:<text>] [-c:<color|reset>] [reset] [-s]"
    updated: "<green>Nameplate for <white>{target}<green> updated. <gray>prefix={prefix}, suffix={suffix}, color={color}"
    reset: "<green>Nameplate reset for <white>{target}<green>."
    target-notice: "<green>Your nameplate was updated. <gray>prefix={prefix}, suffix={suffix}, color={color}"

channels:
  usage: "<red>Usage: /{label} <channel> [message]"
  denied: "<red>You cannot use the <white>{channel} <red>channel."
  focused: "<green>Focused chat channel: <white>{channel}"
  chat-prefix: "<dark_gray>[<#44CCFF>{channel}</#44CCFF>] <white>"
  chat-separator: "<dark_gray>: <white>"
  message-format: "<dark_gray>[<#44CCFF>{channel}</#44CCFF>] <white>{player}<dark_gray>: <white>{message}"

social:
  party:
    usage: "<red>Usage: /{label} <invite|accept|leave|ff|chat> ..."
    player-offline: "<red>That player is not online."
    invited: "<green>Invited <white>{target}<green> to your party."
    invite-received: "<white>{player} <#44CCFF>invited you to a party. <gray>/party accept"
    joined: "<green>Joined the party."
    no-invite: "<red>You do not have a pending party invite."
    left: "<green>Left your party."
    friendly-fire: "<green>Party friendly fire: <white>{state}"
    chat-usage: "<red>Usage: /{label} <message>"
    not-in-party: "<red>You are not in a party."
    chat-format: "<dark_gray>[<#44CCFF>Party</#44CCFF>] <white>{player}<dark_gray>: <white>{message}"
  friend:
    usage: "<red>Usage: /{label} <add|remove|list> <player>"
    empty: "<gray>You do not have any friends added."
    list: "<green>Friends: <white>{friends}"
    removed: "<green>Removed <white>{target}<green> from your friend list."
    not-friend: "<red><white>{target} <red>was not on your friend list."
    added: "<green>Added <white>{target}<green> to your friend list."
    notify-join: "<white>{player} <green>joined <gray>the server."
    notify-quit: "<white>{player} <red>left <gray>the server."

mail:
  usage: "<red>Usage: /{label} [read|send|sendtemp|delete|clear|sendall] ..."
  send-usage: "<red>Usage: /{label} send <player> <message>"
  sendtemp-usage: "<red>Usage: /{label} sendtemp <player> <time> <message>"
  delete-usage: "<red>Usage: /{label} delete <number>"
  sendall-usage: "<red>Usage: /{label} sendall <message>"
  mailall-usage: "<red>Usage: /{label} <send|clear|remove> [message]"
  empty: "<gray>No mail found for <white>{target}<gray>."
  header: "<#44CCFF><bold>Mail for {target}</bold> <gray>({count})"
  entry: "<gray>{index}. <white>{sender} <dark_gray>({date}, expires {expires})<gray>: <white>{message}"
  sent: "<green>Mail sent to <white>{target}<green>."
  sent-temp: "<green>Temporary mail sent to <white>{target}<green> for <white>{duration}<green>."
  invalid-duration: "<red>Invalid mail duration <white>{duration}<red>."
  never-expires: "never"
  received-online: "<#44CCFF>You have new mail from <white>{sender}<#44CCFF>. <gray>/mail read"
  unread-notice: "<#44CCFF>You have <white>{count}<#44CCFF> unread mail message(s). <gray>/mail read"
  cleared: "<green>Cleared <white>{count}<green> mail message(s) for <white>{target}<green>."
  deleted: "<green>Deleted mail message <white>#{index}<green>."
  invalid-index: "<red>No mail message exists at index <white>{index}<red>."
  console-target-required: "<red>Console must specify a player mailbox."
  console-sender-name: "Console"
  sendall-complete: "<green>Sent mail to <white>{count}<green> known player(s)."
  mailall-cleared: "<green>Cleared <white>{count}<green> mail message(s) from all mailboxes."
  mailall-removed: "<green>Removed <white>{count}<green> matching mail message(s) from all mailboxes."

maintenance:
  usage: "<red>Usage: /{label} [true|false|status] [message]"
  enabled: "<green>Maintenance mode enabled. <gray>Message: <white>{message}"
  disabled: "<green>Maintenance mode disabled."
  status: "<#44CCFF>Maintenance is <white>{state}<gray>. Message: <white>{message} <dark_gray>(updated by {updated_by}, {updated_at})"
  kick: "<red>{message}"
  state:
    enabled: "<red>enabled"
    disabled: "<green>disabled"

user-meta:
  usage: "<red>Usage: /{label} <player> <add|remove|clear|list|increment> [key] [value] [-s]"
  added: "<green>Set metadata <white>{key} <green>for <white>{target} <green>to <white>{value}<green>."
  removed: "<green>Removed metadata <white>{key} <green>from <white>{target}<green>."
  missing: "<yellow>{target} does not have metadata key <white>{key}<yellow>."
  cleared: "<green>Cleared <white>{count} <green>metadata entries from <white>{target}<green>."
  empty: "<gray>{target} has no stored metadata."
  header: "<#44CCFF><bold>User Meta</bold> <gray>for <white>{target} <dark_gray>({count})"
  entry: "<gray>- <white>{key}<dark_gray>: <#44CCFF>{value}"
  incremented: "<green>Incremented metadata <white>{key} <green>for <white>{target} <green>to <white>{value}<green>."
  invalid-number: "<red>Metadata <white>{key} <red>for <white>{target} <red>must be numeric. Current/input value: <white>{value}"
  changed-notice: "<gray>Your metadata key <white>{key} <gray>was updated."

stats:
  top:
    header: "<#44CCFF><bold>Top {stat}</bold>"
    entry: "<gray>{rank}. <white>{player} <dark_gray>- <#44CCFF>{value}"
    empty: "<gray>No leaderboard entries have been recorded for <white>{stat}<gray>."
  playtime:
    usage: "<red>Usage: /{label} [player]"
    self: "<green>Your playtime is <white>{time}<green>. <dark_gray>({seconds}s)"
    other: "<green><white>{player}<green>'s playtime is <white>{time}<green>. <dark_gray>({seconds}s)"
    unknown: "<red>No recorded playtime was found for <white>{target}<red>."
  editplaytime:
    usage: "<red>Usage: /{label} [player] <add|take|set> <amount> [-s]"
    updated: "<green>Playtime for <white>{player}<green> is now <white>{time}<green>. Requested amount: <white>{amount}<green>. <dark_gray>({seconds}s)"
    target-notice: "<green>Your playtime was updated to <white>{time}<green>."
  cplaytime:
    usage: "<red>Usage: /{label} [player]"
    title: "<#44CCFF>Playtime <dark_gray>- <white>{player}"
    total-name: "<#44CCFF>Total Playtime"
    total-lore: "<gray>{time} <dark_gray>({seconds}s)"
    session-name: "<#44CCFF>Current Session"
    session-lore: "<gray>{session} <dark_gray>({session_seconds}s)"
    kills-name: "<#44CCFF>Player Kills"
    kills-lore: "<gray>{kills}"
    deaths-name: "<#44CCFF>Deaths"
    deaths-lore: "<gray>{deaths}"
    blocks-name: "<#44CCFF>Blocks Broken"
    blocks-lore: "<gray>{blocks}"
    mobs-name: "<#44CCFF>Mobs Killed"
    mobs-lore: "<gray>{mobs}"
  playtimetop:
    usage: "<red>Usage: /{label} [page]"
    header: "<#44CCFF><bold>Top Playtime</bold> <gray>page <white>{page}"
    entry: "<gray>{rank}. <white>{player} <dark_gray>- <#44CCFF>{time} <dark_gray>({seconds}s)"
    empty: "<gray>No playtime leaderboard entries were found for page <white>{page}<gray>."

backups:
  started: "<green>Backup started asynchronously."
  completed: "<green>Backup complete: <white>{file}"
  failed: "<red>Backup failed: <white>{reason}"
  failed-log: "Backup failed: {reason}"

worlds:
  usage: "<red>Usage: /{label} <create|load|unload|delete|setrule|list> ..."
  list: "<green>Worlds: <white>{worlds}"
  create:
    usage: "<red>Usage: /{label} create <name> [normal|nether|end] [seed] [generator]"
    success: "<green>World <white>{world} <green>created."
    failed: "<red>Unable to create world <white>{world}<red>."
  load:
    usage: "<red>Usage: /{label} load <name>"
    success: "<green>World <white>{world} <green>loaded."
    failed: "<red>Unable to load world <white>{world}<red>."
  unload:
    usage: "<red>Usage: /{label} unload <name>"
    success: "<green>World <white>{world} <green>unloaded."
    failed: "<red>Unable to unload world <white>{world}<red>."
  unloadchunks:
    usage: "<red>Usage: /{label} [-f]"
    started: "<green>Queued <white>{chunks}<green> loaded chunk(s) for gradual unload. <dark_gray>Batch: <white>{batch}"
    done: "<green>Chunk unload complete. <dark_gray>Unloaded: <white>{unloaded}<dark_gray>, skipped/kept: <white>{skipped}"
    busy: "<red>A chunk unload pass is already running."
  delete:
    usage: "<red>Usage: /{label} delete <name>"
    unload-failed: "<red>Unable to unload world <white>{world} <red>first."
    unsafe: "<red>Refusing to delete unsafe world path for <white>{world}<red>."
    success: "<green>World <white>{world} <green>deleted."
    failed: "<red>Unable to delete world <white>{world}<red>: <white>{reason}"
  setrule:
    usage: "<red>Usage: /{label} setrule <world> <gamerule|difficulty|pvp> <value>"
    not-loaded: "<red>World <white>{world} <red>is not loaded."
    invalid: "<red>Invalid world setting <white>{setting}<red>=<white>{value}<red>."
    saved: "<green>Saved <white>{setting}<green>=<white>{value} <green>for <white>{world}<green>."
  gamerule:
    usage: "<red>Usage: /{label} [world] <gamerule|difficulty|pvp> <value>"
    not-loaded: "<red>World <white>{world} <red>is not loaded."
    invalid: "<red>Invalid world setting <white>{setting}<red>=<white>{value}<red>."
    saved: "<green>Saved <white>{setting}<green>=<white>{value} <green>for <white>{world}<green>."

teleport:
  spawn:
    success: "<green>Teleported to spawn."
    set: "<green>Spawn location set."
  home:
