    enabled: true
  jail:
    enabled: true
  announcements:
    enabled: true
  chat-filter:
    enabled: true
  tablist:
    enabled: true
  backpacks:
    enabled: true
  combat-tag:
    enabled: true
  rtp:
    enabled: true
  item-editor:
    enabled: true
  utility-bindings:
    enabled: true
  afk:
    enabled: true
  interactions:
    enabled: true
  stats:
