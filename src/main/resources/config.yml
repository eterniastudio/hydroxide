    enabled: true
moderation:
  enabled: true

environment:
  default-weather-duration-seconds: 600

admin-utilities:
  counter:
    default-seconds: 10
    max-seconds: 300
    default-range: 30.0
    max-range: 250.0
    default-message: "<#44CCFF>Counter"
  spawnmob:
    max-amount: 10
    require-type-permission: false
  spawner:
    max-distance: 64
    require-type-permission: false
  tree:
    max-distance: 64
  break:
    max-distance: 64
  antioch:
    fuse-ticks: 60
    power: 1.2
  kittycannon:
    fuse-ticks: 40
    velocity: 1.6
    explosion-power: 2.0
    break-blocks: false
  beezooka:
    fuse-ticks: 40
    velocity: 1.6
    explosion-power: 2.0
    break-blocks: false
  nuke:
    amount: 12
    radius: 5.0
    height: 16.0
    fuse-ticks: 80
  launch:
    default-power: 2.0
    no-damage-seconds: 10
  findbiome:
    default-radius: 6400
    max-radius: 20000
    horizontal-resolution: 32
    vertical-resolution: 64
  lastonline:
    page-size: 10

worlds:
  unloadchunks:
    batch-size: 25

storage:
  type: "sqlite"
  sqlite:
    file-name: "database.db"
  mysql:
    host: "localhost"
    port: 3306
    database: "hydroxide"
    username: "root"
    password: ""
    use-ssl: false
  pool:
    maximum-size: 10
    minimum-idle: 2
    connection-timeout-ms: 30000
    idle-timeout-ms: 600000
    max-lifetime-ms: 1800000

help:
  page-size: 8

command-control:
  disabled-commands: []
  disabled-message: ""
  command-permissions: {}
  command-costs: {}
  command-warmups: {}
  command-cooldowns: {}
  command-cooldown-persistence: true
  command-worlds: {}
  command-aliases: {}

chat:
  allow-player-color-codes: true
  format: "<dark_gray>[<#44CCFF>{world}</#44CCFF>] <white>{name}<dark_gray>: <white>{message}"
  broadcast-format: "<#FFB000><bold>Broadcast</bold> <dark_gray>> <white>{message}"
  mutechat:
    default-duration: "1h"
  command-spy:
    excluded-prefixes:
      - "login"
      - "register"
      - "changepassword"

teleport:
  request-timeout-seconds: 120

navigation:
  default-home-limit: 3
  max-home-limit: 25
  warmup-seconds: 3

first-join:
  firework: true
  items:
    - "BREAD:16"
    - "STONE_SWORD:1"

jail:
  default-duration-seconds: 300
  allowed-commands:
    - "/help"
    - "/rules"

announcements:
  interval-seconds: 180

backpacks:
  default-slots: 27
  max-slots: 54
  max-vaults: 3
  drop-on-death: false

combat-tag:
  duration-seconds: 15
  blocked-commands:
    - "home"
    - "spawn"
    - "warp"
    - "back"
    - "tpa"
    - "tpaccept"
    - "fly"
    - "rtp"

rtp:
  min-radius: 250
  max-radius: 5000
  max-attempts: 16
  cooldown-seconds: 60
  cost: 0.0
  fall-immunity-seconds: 5

afk:
  idle-seconds: 300
  auto-kick-when-full: false

vanish:
  enabled: true
  persist: true
  auto-vanish-ops: false
  restore-visibility-on-disable: true
  staff-can-see: true

debug:
  visibility: false

maintenance:
  default-message: "Server is currently in maintenance mode. Please try again later."

redis-bridge:
  enabled: false
  server-id: "server"
  host: "127.0.0.1"
  port: 6379
  password: ""
  channel: "hydroxide:chat"

proxy:
  servers: []

economy:
  starting-balance: 100.0
  currency-symbol: "$"
  currency-name: "dollars"
  cheques:
    signing-secret: ""

nickname:
  max-length: 16
  allowed-pattern: "^[A-Za-z0-9_ .-]+$"
  blacklist: []
