name: Hydroxide
version: '@version@'
main: net.axther.hydroxide.Hydroxide
api-version: '1.21'
authors: [ Axther ]
description: A modern modular Paper server core plugin.
depend: [ Vault ]
softdepend: [ PlaceholderAPI ]
commands:
  hydroxide:
    aliases: [ hx, hydrox ]
    description: Hydroxide administration.
    usage: /hydroxide [help|modules|reload|messages reload|cooldown]
    permission: hydroxide.command.hydroxide
  editlocale:
    aliases: [ localeedit ]
    description: Search and edit Hydroxide message keys, then reload messages.yml.
    usage: /editlocale [keyword|reload|set <key> <value>]
    permission: hydroxide.command.editlocale
  help:
    aliases: [ ehelp, hhelp, hydrohelp ]
    description: Show permission-aware Hydroxide command help.
    usage: /help [page|query]
    permission: hydroxide.command.help
  broadcast:
    aliases: [ bc ]
    description: Broadcast a formatted server message.
    usage: /broadcast [!] <message> [-w:world,world] [-r:radius] [-c:world;x;y;z]
    permission: hydroxide.command.broadcast
  actionbarmsg:
    aliases: [ actionbar, actionbroadcast, abroadcast ]
    description: Send a formatted action bar message to one player or all players.
    usage: /actionbarmsg <player|all> [-s:seconds] <message>
    permission: hydroxide.command.actionbarmsg
  bossbarmsg:
    aliases: [ bossbroadcast, bbroadcast ]
    description: Send a temporary formatted boss bar message to one player or all players.
    usage: /bossbarmsg <player|all> [-sec:seconds] <message>
    permission: hydroxide.command.bossbarmsg
  titlemsg:
    aliases: [ titlebroadcast, tbroadcast ]
    description: Send a formatted title message to one player or all players.
    usage: /titlemsg <player|all> [-in:ticks] [-keep:ticks] [-out:ticks] <title> [\n subtitle]
    permission: hydroxide.command.titlemsg
  ctellraw:
    aliases: [ tellrawmsg ]
    description: Send a formatted raw chat component to one player or all players.
    usage: /ctellraw <player|all> <message>
    permission: hydroxide.command.ctellraw
  me:
    aliases: [ action ]
    description: Broadcast an emote action.
    usage: /me <action>
    permission: hydroxide.command.me
  clearchat:
    aliases: [ cc ]
    description: Clear chat for online players.
    usage: /clearchat [self] [-s]
    permission: hydroxide.command.clearchat
  motd:
    aliases: [ messageoftheday ]
    description: Show the configured message of the day.
    usage: /motd
    permission: hydroxide.command.motd
  info:
    description: Show the configured server information page.
    usage: /info
    permission: hydroxide.command.info
  rules:
    description: Show the configured server rules.
    usage: /rules
    permission: hydroxide.command.rules
  ctext:
    aliases: [ customtext ]
    description: Show a configured CMI-style custom text page to yourself, one player, or all players.
    usage: /ctext <cText> [player|all] [sourcePlayer]
    permission: hydroxide.command.ctext
  editctext:
    aliases: [ ctextedit ]
    description: Create, inspect, enable, disable, or delete CMI-style custom text pages.
    usage: /editctext <list|show|set|delete|enable|disable|reload> [name] [line1 | line2]
    permission: hydroxide.command.editctext
  helpop:
    aliases: [ ac ]
    description: Send a help request to online staff.
    usage: /helpop <message>
    permission: hydroxide.command.helpop
  maintenance:
    aliases: [ maint ]
    description: Toggle CMI-style maintenance mode.
    usage: /maintenance [true|false|status] [message]
    permission: hydroxide.command.maintenance
  usermeta:
    aliases: [ usermetadata, playermeta ]
    description: Manage CMI-style custom per-player metadata.
    usage: /usermeta <player> <add|remove|clear|list|increment> [key] [value] [-s]
    permission: hydroxide.command.usermeta
  list:
    aliases: [ who, online, players ]
    description: Show visible online players.
    usage: /list
    permission: hydroxide.command.list
  ping:
    description: Show your ping or another player's ping.
    usage: /ping [player]
    permission: hydroxide.command.ping
  gc:
    aliases: [ lag, mem, memory ]
    description: Show live server memory and world statistics.
    usage: /gc
    permission: hydroxide.command.gc
  tps:
    description: Show live server TPS and MSPT statistics.
    usage: /tps [-spikes]
    permission: hydroxide.command.tps
  servertime:
    aliases: [ serverclock ]
    description: Show the server's local and UTC time.
    usage: /servertime
    permission: hydroxide.command.servertime
  setmotd:
    description: Set the server-list MOTD lines.
    usage: /setmotd <newMotd> [-s]
    permission: hydroxide.command.setmotd
  status:
    aliases: [ serverstatus ]
    description: Show live server status.
    usage: /status
    permission: hydroxide.command.status
  maxplayers:
    description: View or change the runtime maximum player count.
    usage: /maxplayers [amount]
    permission: hydroxide.command.maxplayers
  message:
    aliases: [ msg, tell, whisper, w ]
    description: Send a private message.
    usage: /message <player> <message>
    permission: hydroxide.command.message
  reply:
    aliases: [ r ]
    description: Reply to your last private message.
    usage: /reply <message>
    permission: hydroxide.command.reply
  chat:
    aliases: [ pmchat ]
    description: Focus normal chat into persistent private messages to one player.
    usage: /chat [player|off]
    permission: hydroxide.command.chat
  msgtoggle:
    aliases: [ pmtoggle, messagetoggle ]
    description: Toggle whether you accept private messages.
    usage: /msgtoggle [on|off]
    permission: hydroxide.command.msgtoggle
  ignore:
    aliases: [ unignore ]
    description: Toggle private-message ignores.
    usage: /ignore [player|list|clear]
    permission: hydroxide.command.ignore
  socialspy:
    aliases: [ msgspy ]
    description: Toggle private-message social spy for staff.
    usage: /socialspy [player] [on|off]
    permission: hydroxide.command.socialspy
  commandspy:
    aliases: [ cmdspy ]
    description: Toggle player command spy for staff.
    usage: /commandspy [player] [on|off]
    permission: hydroxide.command.commandspy
  chatcolor:
    aliases: [ chatcolour ]
    description: Set your persistent chat message color.
    usage: /chatcolor [player] <hex|color|clear>
    permission: hydroxide.command.chatcolor
  colors:
    aliases: [ colours ]
    description: Show supported legacy, hex, and MiniMessage color codes.
    usage: /colors
    permission: hydroxide.command.colors
  colorpicker:
    aliases: [ colourpicker, cpick ]
    description: Resolve a color name or hex value into Hydroxide color formats.
    usage: /colorpicker <hex|color>
    permission: hydroxide.command.colorpicker
  colorlimits:
    aliases: [ colourlimits ]
    description: Show color-related permissions for yourself or an online player.
    usage: /colorlimits [player]
    permission: hydroxide.command.colorlimits
  afk:
    description: Toggle AFK status for yourself or another player.
    usage: /afk [player] [on|off]
    permission: hydroxide.command.afk
  afkcheck:
    description: Check whether you, a player, or all online players are AFK.
    usage: /afkcheck [player|all]
    permission: hydroxide.command.afkcheck
  spawn:
    description: Teleport to spawn.
    usage: /spawn
    permission: hydroxide.command.spawn
  setspawn:
    description: Set the server spawn location.
    usage: /setspawn
    permission: hydroxide.command.setspawn
  home:
    description: Teleport to a saved home.
    usage: /home [name]
    permission: hydroxide.command.home
  sethome:
    description: Save a home.
    usage: /sethome [name]
    permission: hydroxide.command.sethome
  delhome:
    aliases: [ removehome ]
    description: Delete a saved home.
    usage: /delhome [name]
    permission: hydroxide.command.delhome
  homes:
    description: List your homes.
    usage: /homes
    permission: hydroxide.command.homes
  warp:
    description: Teleport to a warp.
    usage: /warp <name>
    permission: hydroxide.command.warp
  setwarp:
    description: Set a warp.
    usage: /setwarp <name>
    permission: hydroxide.command.setwarp
  delwarp:
    aliases: [ removewarp ]
    description: Delete a warp.
    usage: /delwarp <name>
    permission: hydroxide.command.delwarp
  warps:
    description: List warps.
    usage: /warps
    permission: hydroxide.command.warps
  back:
    description: Return to your previous teleport location.
    usage: /back
    permission: hydroxide.command.back
  dback:
    aliases: [ deathback ]
    description: Return to your last death location, or send another online player to theirs.
    usage: /dback [player] [-s]
    permission: hydroxide.command.dback
  resetback:
    description: Clear a stored back location for yourself or an online player.
    usage: /resetback [player] [-s]
    permission: hydroxide.command.resetback
  tpa:
    description: Request to teleport to another player.
    usage: /tpa <player>
    permission: hydroxide.command.tpa
  tpahere:
    aliases: [ tpaskhere ]
    description: Request another player to teleport to you.
    usage: /tpahere <player>
    permission: hydroxide.command.tpahere
  tpaall:
    description: Ask all online players to teleport to you.
    usage: /tpaall
    permission: hydroxide.command.tpaall
  tpacancel:
    aliases: [ tpcancel ]
    description: Cancel your outgoing teleport request.
    usage: /tpacancel
    permission: hydroxide.command.tpacancel
  tptoggle:
    aliases: [ tpatoggle ]
    description: Toggle whether you receive teleport requests.
    usage: /tptoggle [on|off]
    permission: hydroxide.command.tptoggle
  tpauto:
    aliases: [ tpautoaccept ]
    description: Toggle automatic acceptance of teleport requests.
    usage: /tpauto [on|off]
    permission: hydroxide.command.tpauto
  tpaccept:
    description: Accept a teleport request.
    usage: /tpaccept
    permission: hydroxide.command.tpaccept
  tpdeny:
    description: Deny a teleport request.
    usage: /tpdeny
    permission: hydroxide.command.tpdeny
  tp:
    description: Teleport yourself or another player to an online player.
    usage: /tp <player> [target]
    permission: hydroxide.command.tp
  tphere:
    aliases: [ s ]
    description: Teleport an online player to you.
    usage: /tphere <player>
    permission: hydroxide.command.tphere
  tpo:
    description: Force teleport yourself or another player to an online player.
    usage: /tpo <player> [target]
    permission: hydroxide.command.tpo
  tpohere:
    description: Force teleport an online player to you.
    usage: /tpohere <player>
    permission: hydroxide.command.tpohere
  tpall:
    description: Teleport all online players to you or a target player.
    usage: /tpall [target]
    permission: hydroxide.command.tpall
  tpallworld:
    description: Teleport all online players from one world to a target location.
    usage: /tpallworld <world> [world;x;y;z[;yaw;pitch]] [-a]
    permission: hydroxide.command.tpallworld
  tppos:
    description: Teleport to coordinates with support for relative ~ syntax.
    usage: /tppos [-p:player] <x> <y> <z> [world] [pitch] [yaw]
    permission: hydroxide.command.tppos
  tpopos:
    description: Force teleport to coordinates with support for relative ~ syntax.
    usage: /tpopos [-p:player] <x> <y> <z> [world] [pitch] [yaw]
    permission: hydroxide.command.tpopos
  jump:
    aliases: [ j ]
    description: Teleport to the block you are looking at.
    usage: /jump
    permission: hydroxide.command.jump
  down:
    aliases: [ descend ]
    description: Teleport one floor down, or to the lowest safe floor with max.
    usage: /down [player] [max] [-s]
    permission: hydroxide.command.down
  world:
    description: Teleport to another world at your current position.
    usage: /world <normal|nether|end|world> [player] [-s]
    permission: hydroxide.command.world
  patrol:
    description: Teleport to online players without repeating targets until each has been visited.
    usage: /patrol [reset]
    permission: hydroxide.command.patrol
  fly:
    description: Toggle flight.
    usage: /fly [player]
    permission: hydroxide.command.fly
  tfly:
    description: Temporarily enable flight for an online player.
    usage: /tfly <player> [timeInSec|+seconds|0] [-s]
    permission: hydroxide.command.tfly
  god:
    description: Toggle god mode.
    usage: /god [player]
    permission: hydroxide.command.god
  tgod:
    description: Temporarily enable god mode for an online player.
    usage: /tgod <player> [timeInSec|+seconds|0] [-s]
    permission: hydroxide.command.tgod
  heal:
    description: Heal a player.
    usage: /heal [player|all] [amount|percent]
    permission: hydroxide.command.heal
  feed:
    description: Feed a player.
    usage: /feed [player|all] [-s]
    permission: hydroxide.command.feed
  hunger:
    description: Set food level for one player or all online players.
    usage: /hunger <player|all> <0-20>
    permission: hydroxide.command.hunger
  saturation:
    description: Set saturation level for one player or all online players.
    usage: /saturation <player|all> <0-20>
    permission: hydroxide.command.saturation
  maxhp:
    aliases: [ maxhealth ]
    description: Set, add, take, or clear a player's maximum health.
    usage: /maxhp <set|add|take|clear> [player] [amount]
    permission: hydroxide.command.maxhp
  scale:
    description: Set, add, take, or clear a player's entity scale.
    usage: /scale <set|add|take|clear> [player] [amount] [-s]
    permission: hydroxide.command.scale
  glow:
    description: Toggle glowing or set a colored glow for an online player.
    usage: /glow [player] [on|off|toggle|color]
    permission: hydroxide.command.glow
  notarget:
    aliases: [ nomobtarget ]
    description: Toggle whether mobs can target you or another online player.
    usage: /notarget [player] [true|false|toggle]
    permission: hydroxide.command.notarget
  playercollision:
    aliases: [ collision ]
    description: Toggle whether an online player collides with other entities.
    usage: /playercollision [player] [true|false|toggle] [-s]
    permission: hydroxide.command.playercollision
  cuff:
    aliases: [ handcuff ]
    description: Suspend or restore an online player's actions.
    usage: /cuff <player> [true|false|toggle] [-s]
    permission: hydroxide.command.cuff
  speed:
    aliases: [ flyspeed, walkspeed ]
    description: Set walk or fly speed.
    usage: /speed <1-10> [walk|fly] [player]
    permission: hydroxide.command.speed
  gamemode:
    aliases: [ gm, gmc, gms, gma, gmsp ]
    description: Set gamemode.
    usage: /gamemode <mode> [player]
    permission: hydroxide.command.gamemode
  effect:
    aliases: [ potion, potioneffect ]
    description: Apply or clear potion effects for one player or all online players.
    usage: /effect <player|all> <effect|clear> [seconds] [amplifier] [-visual]
    permission: hydroxide.command.effect
  air:
    description: Set remaining air ticks for one player or all online players.
    usage: /air <player|all> <ticks|max>
    permission: hydroxide.command.air
  falldistance:
    aliases: [ falldist ]
    description: Set fall distance for one player or all online players.
    usage: /falldistance <player|all> <distance>
    permission: hydroxide.command.falldistance
  kick:
    description: Kick one online player or all online players with an optional reason.
    usage: /kick <player|all> [reason] [-s]
    permission: hydroxide.command.kick
  kickall:
    description: Kick all online players with an optional reason.
    usage: /kickall [reason] [-s]
    permission: hydroxide.command.kick
  ban:
    description: Ban a player profile with an optional reason.
    usage: /ban <player> [reason]
    permission: hydroxide.command.ban
  banlist:
    description: List active player bans.
    usage: /banlist [page]
    permission: hydroxide.command.banlist
  checkban:
    aliases: [ baninfo ]
    description: Check whether a player profile is banned.
    usage: /checkban <player>
    permission: hydroxide.command.checkban
  tempban:
    description: Temporarily ban a player profile.
    usage: /tempban <player> <duration> [reason]
    permission: hydroxide.command.tempban
  unban:
    aliases: [ pardon ]
    description: Remove a player profile ban.
    usage: /unban <player>
    permission: hydroxide.command.unban
  ipban:
    aliases: [ banip, ban-ip ]
    description: Ban an IP address or the current IP of an online player.
    usage: /ipban <ip|player> [reason] [-s]
    permission: hydroxide.command.ipban
  ipbanlist:
    description: List active IP bans.
    usage: /ipbanlist [page]
    permission: hydroxide.command.ipbanlist
  unbanip:
    aliases: [ pardonip, pardon-ip ]
    description: Remove an IP ban.
    usage: /unbanip <ip>
    permission: hydroxide.command.unbanip
  mute:
    aliases: [ silence ]
    description: Mute a player until manually unmuted.
    usage: /mute <player> [reason]
    permission: hydroxide.command.mute
  mutechat:
    aliases: [ globalmute, chatmute ]
    description: Temporarily prevent public chat messages.
    usage: /mutechat [time|status|off] [-s] [reason]
    permission: hydroxide.command.mutechat
  tempmute:
    description: Temporarily mute a player.
    usage: /tempmute <player> <duration> [reason]
    permission: hydroxide.command.tempmute
  unmute:
    description: Remove a player mute.
    usage: /unmute <player>
    permission: hydroxide.command.unmute
  warn:
    description: Record a warning for a player.
    usage: /warn <player> <reason>
    permission: hydroxide.command.warn
  warnings:
    aliases: [ warns ]
    description: Show stored warnings for a player.
    usage: /warnings <player>
    permission: hydroxide.command.warnings
  clearwarnings:
    aliases: [ clearwarns ]
    description: Clear stored warnings for a player.
    usage: /clearwarnings <player>
    permission: hydroxide.command.clearwarnings
  editwarnings:
    description: CMI-style warning editor for clearing one player or all warnings.
    usage: /editwarnings <player|clearall> [clear]
    permission: hydroxide.command.editwarnings
  time:
    description: Set world time.
    usage: /time <day|noon|night|midnight|ticks> [world]
    permission: hydroxide.command.time
  day:
    description: Set world time to day.
    usage: /day [world]
    permission: hydroxide.command.time
  night:
    description: Set world time to night.
    usage: /night [world]
    permission: hydroxide.command.time
  weather:
    description: Set world weather.
    usage: /weather <sun|storm|thunder> [durationSeconds] [world]
    permission: hydroxide.command.weather
  sun:
    description: Clear world weather.
    usage: /sun [durationSeconds] [world]
    permission: hydroxide.command.weather
  storm:
    description: Start rain in a world.
    usage: /storm [durationSeconds] [world]
    permission: hydroxide.command.weather
  thunder:
    description: Start thunder in a world.
    usage: /thunder [durationSeconds] [world]
    permission: hydroxide.command.weather
  ptime:
    aliases: [ playertime ]
    description: Set or reset personal client-side time.
    usage: /ptime <reset|day|noon|night|midnight|ticks> [player]
    permission: hydroxide.command.ptime
  pweather:
    aliases: [ playerweather ]
    description: Set or reset personal client-side weather.
    usage: /pweather <reset|sun|storm|thunder> [player]
    permission: hydroxide.command.pweather
  nickname:
    aliases: [ nick ]
    description: Set or clear a formatted nickname.
    usage: /nickname [player] <nickname|clear>
    permission: hydroxide.command.nickname
  realname:
    description: Resolve an active nickname to a real username.
    usage: /realname <nickname>
    permission: hydroxide.command.realname
  nameplate:
    description: Set a player's above-head nameplate prefix, suffix, or color.
    usage: /nameplate [player] [-pref:<text>] [-suf:<text>] [-c:<color|reset>] [reset] [-s]
    permission: hydroxide.command.nameplate
  balance:
    aliases: [ bal, money ]
    description: Check your balance or another player's balance.
    usage: /balance [player]
    permission: hydroxide.command.balance
  baltop:
    aliases: [ balancetop, moneytop ]
    description: Show the richest known players.
    usage: /baltop [page]
    permission: hydroxide.command.baltop
  pay:
    description: Send money to another player.
    usage: /pay <player> <amount>
    permission: hydroxide.command.pay
  paytoggle:
    aliases: [ ptoggle ]
    description: Toggle whether other players can pay you.
    usage: /paytoggle [on|off]
    permission: hydroxide.command.paytoggle
  cheque:
    aliases: [ check ]
    description: Convert money into a signed physical cheque item.
    usage: /cheque [player] <amount>
    permission: hydroxide.command.cheque
  eco:
    description: Administer Hydroxide economy balances.
    usage: /eco <give|take|set> <player> <amount>
    permission: hydroxide.command.eco
  groupspawn:
    description: Manage permission and Vault group spawn points.
    usage: /groupspawn <set|delete> <group> [priority]
    permission: hydroxide.command.groupspawn
  homesgui:
    aliases: [ homegui ]
    description: Open the home navigation menu.
    usage: /homesgui
    permission: hydroxide.command.homesgui
  warpgui:
    aliases: [ warpsgui, warpmenu ]
    description: Open the warp navigation menu.
    usage: /warpgui
    permission: hydroxide.command.warpgui
  setjail:
    description: Set a jail location.
    usage: /setjail <name>
    permission: hydroxide.command.setjail
  jail:
    description: Jail a player for a duration.
    usage: /jail <player> [duration] [jail] [cellId] [-s] [r:<reason>]
    permission: hydroxide.command.jail
  togglejail:
    aliases: [ etogglejail ]
    description: Jail an unjailed player or release an already jailed player.
    usage: /togglejail <player> [duration] [jail] [cellId] [-s] [r:<reason>]
    permission: hydroxide.command.togglejail
  unjail:
    description: Release a jailed player.
    usage: /unjail <player> [-s]
    permission: hydroxide.command.unjail
  jails:
    aliases: [ jaillist ]
    description: List configured jail cells and jailed players.
    usage: /jails [jail] [cellId]
    permission: hydroxide.command.jails
  deljail:
    aliases: [ rmjail, remjail ]
    description: Delete a configured jail cell.
    usage: /deljail <name>
    permission: hydroxide.command.deljail
  kit:
    description: Claim, preview, open, or give a kit to another online player.
    usage: /kit [kit] [player] [-s] [-open|-preview] [-c]
    permission: hydroxide.command.kit
  kits:
    description: Open the kit menu.
    usage: /kits
    permission: hydroxide.command.kits
  setkit:
    description: Create a kit from your inventory.
    usage: /setkit <name> [cooldown]
    permission: hydroxide.command.setkit
  createkit:
    description: Essentials-style alias to create a kit from your inventory.
    usage: /createkit <name> [cooldown]
    permission: hydroxide.command.createkit
  delkit:
    aliases: [ deletekit ]
    description: Delete a kit and its stored cooldown entries.
    usage: /delkit <kit>
    permission: hydroxide.command.delkit
  showkit:
    description: Preview a kit's contents.
    usage: /showkit <kit> [player]
    permission: hydroxide.command.showkit
  kitcdreset:
    aliases: [ kitcooldownreset ]
    description: Reset kit cooldowns for one player or all stored cooldowns.
    usage: /kitcdreset <kit> <player|all>
    permission: hydroxide.command.kitcdreset
  shop:
    description: Open the Hydroxide shop menu.
    usage: /shop
    permission: hydroxide.command.shop
  sell:
    aliases: [ sellall ]
    description: Sell held, matching, or all configured shop items.
    usage: /sell [hand|all|material] [amount]
    permission: hydroxide.command.sell
  worth:
    aliases: [ price ]
    description: Show the configured sell value for a held or named item.
    usage: /worth [hand|material] [amount]
    permission: hydroxide.command.worth
  setworth:
    aliases: [ setprice ]
    description: Set the configured sell value for a held or named item.
    usage: /setworth [material] <price>
    permission: hydroxide.command.setworth
  generateworth:
    description: Auto-generate CMI-style sell worth values for item materials.
    usage: /generateworth [basePrice] [-overwrite]
    permission: hydroxide.command.generateworth
  worthlist:
    description: List configured or missing CMI-style item worth values.
    usage: /worthlist [player] [-missing] [-p:page]
    permission: hydroxide.command.worthlist
  portal:
    description: Manage coordinate portals.
    usage: /portal <create|delete> <name> ...
    permission: hydroxide.command.portal
  lock:
    description: Lock a container or door.
    usage: /lock
    permission: hydroxide.command.lock
  unlock:
    description: Unlock a container or door.
    usage: /unlock
    permission: hydroxide.command.unlock
  vanish:
    aliases: [ v ]
    description: Toggle vanish or repair player visibility.
    usage: /vanish [player|status [player]|fix [player]]
    permission: hydroxide.command.vanish
  backpack:
    aliases: [ bp ]
    description: Open your portable backpack.
    usage: /backpack
    permission: hydroxide.command.backpack
  pv:
    aliases: [ playervault ]
    description: Open a numbered portable vault.
    usage: /pv [number]
    permission: hydroxide.command.pv
  rtp:
